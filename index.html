<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <link href="https://fonts.googleapis.com/css2?family=Alata&display=swap" rel="stylesheet">  
        <title>David White Portfolio</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="container">
            <nav>
                <div class="left-side">
                    <div class="nav-link-wrapper">
                        <a href="index.html">Home</a>
                    </div>
                    <div class="nav-link-wrapper">
                        <a href="about.html">About</a>
                    </div>
                </div>
                
                <div class="right-side">
                    <div class="brand">DAVID WHITE</div>
                </div>
            </nav>
            <div class="content-wrapper">
                <div class="portfolio-items-wrapper">
                    <div class="portfolio-item-wrapper">
                        <div class="portfolio-img-background" style="background-image: url(images/logos/triviatrainer.png);" ></div>
                        <div class="image-text-wrapper">
                            <div>
                                <a class="subtitle" href="https://trivia-master-trainer.herokuapp.com/" target="_blank">
                                    Trivia Trainer: A React app that serves up challenging trivia question to help you train to become the next Jeopardy star!
                                </a>
                            </div>
                        </div>
                    </div>
                    <div class="portfolio-item-wrapper">
                        <div class="portfolio-img-background" style="background-image: url(images/logos/collabodraw.png);" ></div>
                        <div class="image-text-wrapper">
                            <div>
                                <a class="subtitle" href="https://collabo-draw.herokuapp.com/" target="_blank">
                                    Collabo-Draw: A web app that uses websockets and the HTML5 canvas to allow users to draw collaboratively.
                                </a>
                            </div>
                        </div>
                    </div>
                    <div class="portfolio-item-wrapper">
                        <div class="portfolio-img-background" style="background-image: url(images/logos/shorties.png);" ></div>
                        <div class="image-text-wrapper">
                            <div>
                                <a class="subtitle" href="https://shortiezzz.herokuapp.com/" target="_blank">
                                    Shortiezzz: A URL shortening service.
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
    <script>
        const portfolioItems = document.querySelectorAll(".portfolio-item-wrapper");

        portfolioItems.forEach(item => {
            item.addEventListener("mouseover", () => {
                item.childNodes[1].classList.add("img-darken");
            });
        });

        portfolioItems.forEach(item => {
            item.addEventListener("mouseout", () => {
                item.childNodes[1].classList.remove("img-darken");
            });
        });
    </script>
</html>
